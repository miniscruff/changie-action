name: "unit-test"
on:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'

jobs:
  units:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Setup Node
      uses: actions/setup-node@v7.0.0
      with:
        node-version: 24.x
    - run: npm ci

    - run: npm ci
    - run: npm run build
    # - run: npm test

  # test action works running from the graph
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Run version
      uses: ./
      with:
        args: '--version'
