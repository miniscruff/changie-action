name: release

on:
  push:
    branches: [ main ]
    paths: [ CHANGELOG.md ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Get the latest version
      id: latest
      uses: ./
      with:
        version: latest
        args: latest

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        body_path: ".changes/${{ steps.latest.outputs.output }}.md"
        tag_name: "${{ steps.latest.outputs.output }}"

    # softprops/action-gh-release only places a tag on creation, so it won't move v3 on its own
    - name: Move major version tag
      run: |
        git tag -f v3
        git push origin v3 --force

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        body: View full release notes in the [Changelog](https://github.com/miniscruff/changie-action/blob/main/CHANGELOG.md)
        tag_name: v3 # currently no way of finding this in changie directly
